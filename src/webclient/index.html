<!DOCTYPE html>
<html>
	<head>
		<title>Stasis Viewer</title>
		<style type="text/css">
			html { overflow: hidden; }
			html, body { height: 100%; margin: 0; padding: 0; }
			canvas { height: 100%; width: 100%; font-size: 0; margin: 0; padding: 0; }
		</style>
	</head>
	<body>
		<!-- Server-injected runtime config (window.__stasis*) — must load first -->
		<script type="text/javascript" src="config.js"></script>
		<!-- Patched copy of prismarine-viewer's bundle, served by our Express handler -->
		<script type="text/javascript" src="index.js"></script>
		<!-- Runtime monkey-patches loaded after the bundle has booted -->
		<script type="text/javascript" src="overrides.js"></script>
	</body>
</html>
