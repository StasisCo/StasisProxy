services:

  stasis:
    build: .
    image: ghcr.io/stasisco/stasisproxy:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - minecraft:/root/.minecraft
    restart: on-failure
    environment:
      - DATABASE_URL
      - DATABASE_URL=postgresql://stasis:stasis@postgres:5432/stasis
      - MC_HOST
      - MC_PROFILE=/root/.minecraft
      - MC_USERNAME
      - MC_VERSION=1.20.1
      - PROXY_PORT=25577
      - REDIS_URL=redis://redis:6379
    env_file:
      - path: .env
        required: false

  viaproxy:
    image: ghcr.io/viaversion/viaproxy:latest
    depends_on:
      - stasis
    ports:
      - "25565:25565"
    # Override the default config-file entrypoint so we can use CLI mode.
    # proxy-online-mode true: ViaProxy authenticates the player at the frontend,
    # then uses their session to satisfy StasisProxy's online-mode handshake.
    entrypoint: [ "java", "-jar", "/app/ViaProxy.jar" ]
    command:
      - cli
      - --bind-address
      - 0.0.0.0:25565
      - --target-address
      - stasis:25577
      - --proxy-online-mode
      - "true"
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: stasis
      POSTGRES_PASSWORD: stasis
      POSTGRES_DB: stasis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U stasis" ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  minecraft:
  pgdata:
