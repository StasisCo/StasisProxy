name: Continuous Deployment

on:
  workflow_dispatch:
    inputs:
      label:
        description: "Label to apply to the deployment"
        required: false
        default: "latest"
      deploy:
        description: "Redeploy services after build"
        required: false
        type: boolean
  push:
    branches: ["*"]

jobs:
  build:
    name: Build Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - uses: oven-sh/setup-bun@v1

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      # Build and push the Docker image
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tehpicix/stasispearl:${{ inputs.label }}
            ghcr.io/tehpicix/stasispearl:${{ github.ref_name }}
            ghcr.io/tehpicix/stasispearl:${{ github.sha }}

  deploy:
    name: Deploy
    if: ${{ inputs.deploy == true || (github.event_name == 'push' && github.ref_name == 'stable') }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to server
        run: |
          curl --request POST --url ${{ secrets.WEBHOOK_HOST }}/webhooks/d93586ec-6ebc-4f8e-9758-340bd77b4998
          curl --request POST --url ${{ secrets.WEBHOOK_HOST }}/webhooks/17780d9c-e36e-46a0-948a-0b5db24bcaf0
