name: Continuous Deployment

on:
  workflow_run:
    workflows: [ "Continuous Integration" ]
    types: [ completed ]
    branches: [ "**" ]

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Push (cached)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Checkout Types
        uses: actions/checkout@v4
        with:
          repository: stasisco/hackware-server
          path: hackware-server
          token: ${{ secrets.GH_TOKEN }}

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' < package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [ "$BRANCH" = "master" ]; then
            echo "VERSION_TAG=$VERSION" >> $GITHUB_ENV
          else
            echo "VERSION_TAG=$VERSION.$BRANCH" >> $GITHUB_ENV
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Copy Types
        run: bun run copy-types

      - name: Build and push (with BuildKit cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          tags: |
            ghcr.io/stasisco/stasisproxy:${{ github.event.workflow_run.head_branch == 'master' && 'latest' || github.event.workflow_run.head_branch }}
            ghcr.io/stasisco/stasisproxy:${{ github.event.workflow_run.head_sha }}
            ghcr.io/stasisco/stasisproxy:${{ env.VERSION_TAG }}
